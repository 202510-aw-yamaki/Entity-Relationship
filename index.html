<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>app</title>
<style>
:root{--line:#cfc4b8;--text:#2f2a24;--muted:#6e655c;--accent:#9d5c37;--selected:#1e6d8c;--danger:#ad3d2d;--canvas:#f8f5ef;--panel:#fffdf9;--shadow:0 10px 24px rgba(72,52,37,.08);--ok-bg:#eef7ef;--ok-text:#356244;--warn-bg:#fff4e8;--warn-text:#8a5726}*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;background:linear-gradient(180deg,#efe7dc 0%,#f8f5ef 100%);color:var(--text)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;min-height:100vh}.panel{padding:18px;border-right:1px solid var(--line);background:rgba(255,253,249,.96)}.panel.right{border-right:none;border-left:1px solid var(--line)}.section{margin-bottom:18px;padding:14px;background:var(--panel);border:1px solid #e5dcd1;border-radius:14px;box-shadow:var(--shadow)}.section h1,.section h2,.section h3{margin:0 0 10px;line-height:1.3}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:13px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #cdbfab;border-radius:10px;padding:10px 12px;background:#fffdfa;color:var(--text)}textarea{min-height:96px;resize:vertical}.button-row,.step-row{display:grid;gap:8px}.button-row.two{grid-template-columns:1fr 1fr}button{border:1px solid #cdbfab;border-radius:10px;background:#fff8f1;color:var(--text);padding:10px 12px;cursor:pointer}button.primary{background:var(--accent);color:#fffaf5;border-color:var(--accent)}button.danger{background:#fff2ef;border-color:#d7aa9f;color:var(--danger)}button.active{background:#d7eef6;border-color:var(--selected);color:var(--selected);font-weight:700}.canvas-panel{display:grid;grid-template-rows:auto minmax(0,1fr);min-width:0;background:rgba(248,245,239,.92)}.canvas-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,253,249,.88)}.status{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.diagram{position:relative;overflow:auto;background:radial-gradient(circle at top left,rgba(157,92,55,.08),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0)),var(--canvas)}.surface{position:relative;width:1800px;height:1200px;background-image:linear-gradient(to right,rgba(135,111,88,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(135,111,88,.08) 1px,transparent 1px);background-size:24px 24px}.edge-layer{position:absolute;inset:0;width:100%;height:100%;overflow:visible}.node{position:absolute;border:2px solid #bda892;border-radius:14px;background:#fffdf9;box-shadow:var(--shadow);padding:12px;cursor:grab;user-select:none}.node.sel{border-color:var(--selected);box-shadow:0 0 0 3px rgba(30,109,140,.14),var(--shadow)}.node.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.node.group{background:rgba(255,250,242,.72);border-style:dashed;border-color:#8d7763;z-index:0}.node.group .node-header{margin-bottom:4px}.node.group .node-body{opacity:.88}.node.group-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#f0e4d3;color:#6f573f;font-size:11px;border:1px solid #d8c3aa}.node-header{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.node-title{font-weight:700;line-height:1.35;word-break:break-word}.node-cat{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.node-body{display:grid;gap:8px;font-size:12px;color:var(--muted)}.node-body div{padding-top:6px;border-top:1px solid #f0e5d9}.node-items{padding-top:6px;border-top:1px solid #f0e5d9}.node-items strong{display:block;margin-bottom:6px;color:var(--text)}.item-chip-list{display:grid;gap:6px}.item-chip{padding:6px 8px;border:1px solid #ddd0c2;border-radius:10px;background:#f8f3ec;color:var(--text);line-height:1.45;cursor:pointer}.item-chip.sel{border-color:var(--selected);box-shadow:0 0 0 2px rgba(30,109,140,.12)}.item-chip.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.item-chip-title{font-weight:700}.item-chip-desc{font-size:11px;color:var(--muted)}.items-editor{display:grid;gap:8px}.item-card{padding:10px;border:1px solid #e2d6c8;border-radius:12px;background:#fffaf5}.item-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.item-id{font-size:11px;color:var(--muted)}.item-empty{padding:10px;border:1px dashed #d8cab9;border-radius:10px;background:#fffaf4;color:var(--muted);font-size:12px;line-height:1.6}.empty{padding:18px;border:1px dashed #ccb9a2;border-radius:12px;background:#fffaf4;color:var(--muted);line-height:1.7}.summary{display:grid;gap:8px;font-size:13px}.summary strong{color:var(--text)}.summary-card{padding:10px 12px;border:1px solid #eadfce;border-radius:12px;background:#fffaf4}.summary-grid{display:grid;gap:8px;grid-template-columns:1fr 1fr}.summary-chip{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;border:1px solid #dbc7b2;background:#f7efe4;color:#6e5642;font-size:12px}.help-list{margin:0;padding-left:18px;display:grid;gap:8px;font-size:13px;line-height:1.6}.result-block{padding:10px 12px;border:1px solid #eadfce;border-radius:12px;background:#fffaf4}.result-status{margin:0 0 8px;padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.6}.result-status.ok{background:var(--ok-bg);color:var(--ok-text);border:1px solid #cfe2d2}.result-status.warn{background:var(--warn-bg);color:var(--warn-text);border:1px solid #efd5b5}.result-list{margin:0;padding-left:18px;display:grid;gap:6px}.note{font-size:12px;line-height:1.6;color:var(--muted)}.hidden{display:none!important}@media (max-width:1200px){.app{grid-template-columns:280px minmax(0,1fr)}.panel.right{grid-column:1/-1;border-left:none;border-top:1px solid var(--line)}}@media (max-width:860px){.app{grid-template-columns:1fr}.panel,.panel.right{border:none;border-bottom:1px solid var(--line)}.canvas-panel{min-height:60vh}.summary-grid{grid-template-columns:1fr}}
</style>
<style>
.button-row.three{grid-template-columns:repeat(3,1fr)}
button[disabled]{opacity:.55;cursor:not-allowed}
.step-guide-list{display:grid;gap:8px;margin-top:8px}
.step-guide-item{padding:10px 12px;border:1px solid #e1d5c8;border-radius:12px;background:#fffaf4}
.step-guide-item strong{display:block;color:var(--text);font-size:13px}
.step-guide-item span{display:block;margin-top:4px;font-size:12px;line-height:1.6;color:var(--muted)}
.step-guide-item.active{border-color:var(--selected);box-shadow:0 0 0 2px rgba(30,109,140,.12);background:#f4fbfd}
.step-current-guide{margin-top:6px;font-size:13px;line-height:1.6;color:var(--text)}
.step-current-guide strong{color:var(--selected)}
.diagram{padding:18px}
.surface-frame{position:relative;width:1800px;height:1200px}
.surface{position:absolute;inset:0;transform-origin:top left}
.surface.zooming{transition:transform .12s ease-out}
.node{min-width:180px;min-height:120px}
.node.dst{border-color:#356244;background:#f4fbf5;box-shadow:0 0 0 3px rgba(53,98,68,.12),var(--shadow)}
.node.src::after,.node.dst::after{position:absolute;top:-12px;right:12px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid currentColor;background:#fffdf9}
.node.src::after{content:"始点";color:var(--accent)}
.node.dst::after{content:"つなぎ先";color:#356244}
.item-chip.dst{border-color:#356244;background:#f4fbf5;box-shadow:0 0 0 2px rgba(53,98,68,.12)}
.resize-handle{position:absolute;right:8px;bottom:8px;width:16px;height:16px;border-radius:4px;border:1px solid var(--selected);background:linear-gradient(135deg,rgba(255,255,255,.96) 0%,rgba(30,109,140,.16) 100%);cursor:nwse-resize}
.resize-handle::before{content:"";position:absolute;right:3px;bottom:3px;width:7px;height:7px;border-right:2px solid var(--selected);border-bottom:2px solid var(--selected)}
.edge-preview-line{stroke:var(--accent);stroke-width:2.5;stroke-dasharray:10 7;fill:none;pointer-events:none}
.edge-preview-line.item{stroke:#b06a3c}
.edge-preview-text{font-size:12px;fill:var(--accent);font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;pointer-events:none}
.draw-preview{fill:rgba(30,109,140,.12);stroke:var(--selected);stroke-width:2;stroke-dasharray:8 6;pointer-events:none}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
  <div class="section"><h1 id="app-title"></h1><p id="app-desc" class="note"></p></div>
  <div class="section">
    <h2 id="settings-title"></h2>
    <div class="field"><label id="project-label" for="project-name"></label><input id="project-name" type="text"></div>
    <div class="field"><label id="step-label"></label><div id="step-row" class="step-row"></div></div>
    <div id="step-guide-list" class="step-guide-list"></div>
  </div>
  <div class="section">
    <h2 id="ops-title"></h2>
    <div class="button-row"><button id="add-node-button" class="primary" type="button"></button><button id="add-group-button" type="button"></button><button id="connect-button" type="button"></button><button id="cancel-connect-button" class="hidden" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="delete-selected-button" class="danger" type="button"></button><button id="reset-sample-button" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="undo-button" type="button"></button><button id="redo-button" type="button"></button></div>
    <div class="button-row" style="margin-top:8px"><button id="run-step1-button" type="button"></button><button id="run-step2-button" type="button"></button><button id="run-step3-button" type="button"></button></div>
  </div>
  <div class="section">
    <h2 id="io-title"></h2>
    <div class="button-row two"><button id="save-button" type="button"></button><button id="load-button" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="download-ai-button" type="button"></button><button id="download-human-button" type="button"></button></div>
    <div class="button-row" style="margin-top:8px"><button id="download-consult-json-button" type="button"></button></div>
    <input id="load-input" class="hidden" type="file" accept=".json,application/json">
    <p id="io-note" class="note"></p>
  </div>
  <div class="section"><h2 id="help-title"></h2><ul id="help-list" class="help-list"></ul></div>
</aside>
<main class="canvas-panel">
  <div class="canvas-toolbar"><div><h2 id="canvas-title" style="margin:0"></h2><div id="step-current-guide" class="step-current-guide"></div><div id="connect-guide" class="note"></div></div><div class="status"><span id="summary-step-badge" class="badge"></span><span id="summary-project-badge" class="badge"></span><span id="summary-count-badge" class="badge"></span><span id="summary-zoom-badge" class="badge"></span></div></div>
  <div class="diagram"><div id="diagram-surface" class="surface-frame"><div id="diagram-content" class="surface"><svg id="edge-layer" class="edge-layer" aria-hidden="true"><defs><marker id="arrow-end-marker" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6a5d50"></path></marker><marker id="arrow-start-marker" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#6a5d50"></path></marker><marker id="arrow-end-marker-selected" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e6d8c"></path></marker><marker id="arrow-start-marker-selected" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#1e6d8c"></path></marker></defs></svg></div></div></div>
</main>
<aside class="panel right">
  <div class="section">
    <h2 id="detail-title"></h2>
    <div id="empty-selection" class="empty"></div>
    <div id="node-editor" class="hidden"><h3 id="node-edit-title"></h3><div class="field"><label id="node-group-mode-label" for="node-is-group"></label><select id="node-is-group"></select><p id="node-group-note" class="note"></p></div><div class="field"><label id="node-parent-label" for="node-parent"></label><select id="node-parent"></select><p id="node-parent-note" class="note"></p></div><div class="field"><label id="node-cat-label" for="node-category"></label><select id="node-category"></select></div><div class="field"><label id="node-title-label" for="node-title"></label><input id="node-title" type="text"></div><div class="field"><label id="node-meaning-label" for="node-meaning"></label><textarea id="node-meaning"></textarea></div><div class="field"><label id="node-note-label" for="node-customer-note"></label><textarea id="node-customer-note"></textarea></div><div class="field"><label id="node-items-label"></label><p id="node-items-note" class="note"></p><button id="add-item-button" type="button"></button></div><div id="node-items-editor" class="items-editor"></div><div class="summary"><div><strong>ID:</strong> <span id="node-id"></span></div><div><strong id="pos-strong"></strong> <span id="node-position"></span></div><div><strong id="size-strong"></strong> <span id="node-size"></span></div></div></div>
    <div id="edge-editor" class="hidden"><h3 id="edge-edit-title"></h3><div class="field"><label id="edge-type-label" for="edge-relation-type"></label><select id="edge-relation-type"></select><p id="edge-type-note" class="note"></p></div><div class="field"><label id="edge-label-label" for="edge-label"></label><textarea id="edge-label"></textarea></div><div class="field"><label id="edge-arrow-start-label" for="edge-arrow-start"></label><select id="edge-arrow-start"></select></div><div class="field"><label id="edge-arrow-end-label" for="edge-arrow-end"></label><select id="edge-arrow-end"></select></div><div class="summary"><div><strong>ID:</strong> <span id="edge-id"></span></div><div><strong id="from-strong"></strong> <span id="edge-from"></span></div><div><strong id="to-strong"></strong> <span id="edge-to"></span></div></div></div>
  </div>
  <div class="section"><h2 id="summary-title"></h2><div id="state-summary" class="summary"></div></div>
  <div class="section"><h2 id="step-result-title"></h2><p id="step-result-note" class="note"></p><div class="result-block"><h3 id="step1-block-title"></h3><p id="step1-result-status" class="result-status"></p><ul id="step1-result-list" class="result-list note"></ul></div><div class="result-block" style="margin-top:10px"><h3 id="step2-block-title"></h3><p id="step2-result-status" class="result-status"></p><ul id="step2-result-list" class="result-list note"></ul></div><div class="result-block" style="margin-top:10px"><h3 id="step3-block-title"></h3><p id="step3-result-status" class="result-status"></p><ul id="step3-result-list" class="result-list note"></ul></div></div>
</aside>
</div>
<script>

function nameOf(id){const n=state.nodes.find(v=>v.id===id);return n?`${n.title||"\u30bf\u30a4\u30c8\u30eb\u672a\u5165\u529b"} (${n.id})`:id}
function validationBadge(step,ran,dirty,results,strongCount){if(!ran)return{text:`${step}: \u307e\u3060\u672a\u5b9f\u884c`,cls:"warn"};if(dirty)return{text:`${step}: \u56f3\u304c\u5909\u308f\u3063\u305f\u306e\u3067\u518d\u78ba\u8a8d\u304c\u5fc5\u8981\u3067\u3059`,cls:"warn"};if(results.length)return{text:step==="STEP2"&&strongCount>0?T.step2StrongWarn:`${step}\u3067\u6c17\u306b\u306a\u308b\u70b9\u304c\u3042\u308a\u307e\u3059\u3002`,cls:"warn"};return{text:`${step}: \u73fe\u6642\u70b9\u3067\u5927\u304d\u306a\u4e0d\u8db3\u306f\u898b\u3064\u304b\u3063\u3066\u3044\u307e\u305b\u3093`,cls:"ok"}}
function renderSummary(){el.summaryStepBadge.textContent=state.currentStep;el.summaryProjectBadge.textContent=state.projectName||T.projectUnset;el.summaryCountBadge.textContent=`\u7bb1 ${state.nodes.length} / \u7dda ${state.edges.length}`;el.summaryZoomBadge.textContent=`${T.zoomBadge} ${Math.round(state.zoom*100)}%`;const sel=state.selected.type==="node"?`\u9078\u629e\u4e2d\u306e\u7bb1: ${nameOf(state.selected.id)}`:state.selected.type==="edge"?`\u9078\u629e\u4e2d\u306e\u7dda: ${state.selected.id}`:"\u9078\u629e\u4e2d: \u306a\u3057";const summary=graphSummary();const byCategory=CATS.map(cat=>`${cat}: ${summary.categoryCounts[cat]}`).join("<br>");const step1Badge=validationBadge("STEP1",state.step1Ran,state.step1Dirty,state.step1Results,0);const step2Badge=validationBadge("STEP2",state.step2Ran,state.step2Dirty,state.step2Results,state.step2StrongCount);const step3Badge=validationBadge("STEP3",state.step3Ran,state.step3Dirty,state.step3Results,0);const connectText=!state.connectEnabled?"\u30aa\u30d5":state.connectDrag?`\u30c9\u30e9\u30c3\u30b0\u4e2d (${endpointName(state.connectDrag.fromType,state.connectDrag.fromId)})`:state.connectFromId?`\u59cb\u70b9\u6e96\u5099\u6e08\u307f (${endpointName(state.connectFromType||"node",state.connectFromId)})`:"\u59cb\u70b9\u5f85\u3061";el.stateSummary.innerHTML=`<div class="summary-card"><strong>${T.project}:</strong> ${esc(state.projectName||"\u672a\u5165\u529b")}<br><strong>${T.step}:</strong> ${esc(state.currentStep)}<br><strong>\u9078\u629e\u72b6\u614b:</strong> ${esc(sel)}<br><strong>\u8868\u793a\u500d\u7387:</strong> ${Math.round(state.zoom*100)}%</div><div class="summary-grid"><div class="summary-card"><strong>\u6570\u306e\u307e\u3068\u3081</strong><br>\u7bb1: ${summary.nodeCount}<br>\u89aa\u7bb1: ${summary.groupCount}<br>\u7bb1\u5185\u8981\u4ef6: ${summary.itemCount}<br>\u7dda: ${summary.edgeCount}</div><div class="summary-card"><strong>\u30ab\u30c6\u30b4\u30ea\u5185\u8a33</strong><br>${byCategory}</div></div><div class="summary-card"><strong>\u63a5\u7d9a\u30e2\u30fc\u30c9</strong><br>${esc(connectText)}</div><div class="summary-grid"><div class="summary-card"><span class="summary-chip">${esc(step1Badge.text)}</span></div><div class="summary-card"><span class="summary-chip">${esc(step2Badge.text)}</span></div><div class="summary-card"><span class="summary-chip">${esc(step3Badge.text)}</span></div></div>`}
function renderStepResult(statusEl,listEl,ran,dirty,okText,notRunText,warnText,results,strongCount){listEl.innerHTML="";const badge=validationBadge(notRunText.split(":")[0]||"STEP",ran,dirty,results,strongCount);if(!ran){statusEl.textContent=notRunText;statusEl.className="result-status warn";return}if(!results.length){statusEl.textContent=dirty?(badge.text):okText;statusEl.className=`result-status ${dirty?"warn":"ok"}`;return}statusEl.textContent=dirty?badge.text:warnText;statusEl.className="result-status warn";results.forEach(message=>{const li=document.createElement("li");li.textContent=message;listEl.appendChild(li)})}
