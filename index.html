<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>app</title>
<style>
:root{--line:#cfc4b8;--text:#2f2a24;--muted:#6e655c;--accent:#9d5c37;--selected:#1e6d8c;--danger:#ad3d2d;--canvas:#f8f5ef;--panel:#fffdf9;--shadow:0 10px 24px rgba(72,52,37,.08)}*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;background:linear-gradient(180deg,#efe7dc 0%,#f8f5ef 100%);color:var(--text)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;min-height:100vh}.panel{padding:18px;border-right:1px solid var(--line);background:rgba(255,253,249,.96)}.panel.right{border-right:none;border-left:1px solid var(--line)}.section{margin-bottom:18px;padding:14px;background:var(--panel);border:1px solid #e5dcd1;border-radius:14px;box-shadow:var(--shadow)}.section h1,.section h2,.section h3{margin:0 0 10px;line-height:1.3}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:13px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #cdbfab;border-radius:10px;padding:10px 12px;background:#fffdfa;color:var(--text)}textarea{min-height:96px;resize:vertical}.button-row,.step-row{display:grid;gap:8px}.button-row.two{grid-template-columns:1fr 1fr}button{border:1px solid #cdbfab;border-radius:10px;background:#fff8f1;color:var(--text);padding:10px 12px;cursor:pointer}button.primary{background:var(--accent);color:#fffaf5;border-color:var(--accent)}button.danger{background:#fff2ef;border-color:#d7aa9f;color:var(--danger)}button.active{background:#d7eef6;border-color:var(--selected);color:var(--selected);font-weight:700}.canvas-panel{display:grid;grid-template-rows:auto minmax(0,1fr);min-width:0;background:rgba(248,245,239,.92)}.canvas-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,253,249,.88)}.status{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.diagram{position:relative;overflow:auto;background:radial-gradient(circle at top left,rgba(157,92,55,.08),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0)),var(--canvas)}.surface{position:relative;width:1800px;height:1200px;background-image:linear-gradient(to right,rgba(135,111,88,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(135,111,88,.08) 1px,transparent 1px);background-size:24px 24px}.edge-layer{position:absolute;inset:0;width:100%;height:100%;overflow:visible}.node{position:absolute;border:2px solid #bda892;border-radius:14px;background:#fffdf9;box-shadow:var(--shadow);padding:12px;cursor:grab;user-select:none}.node.sel{border-color:var(--selected);box-shadow:0 0 0 3px rgba(30,109,140,.14),var(--shadow)}.node.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.node-header{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.node-title{font-weight:700;line-height:1.35;word-break:break-word}.node-cat{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.node-body{display:grid;gap:8px;font-size:12px;color:var(--muted)}.node-body div{padding-top:6px;border-top:1px solid #f0e5d9}.empty{padding:18px;border:1px dashed #ccb9a2;border-radius:12px;background:#fffaf4;color:var(--muted);line-height:1.7}.summary{display:grid;gap:8px;font-size:13px}.summary strong{color:var(--text)}.note{font-size:12px;line-height:1.6;color:var(--muted)}.hidden{display:none!important}@media (max-width:1200px){.app{grid-template-columns:280px minmax(0,1fr)}.panel.right{grid-column:1/-1;border-left:none;border-top:1px solid var(--line)}}@media (max-width:860px){.app{grid-template-columns:1fr}.panel,.panel.right{border:none;border-bottom:1px solid var(--line)}.canvas-panel{min-height:60vh}}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
  <div class="section"><h1 id="app-title"></h1><p id="app-desc" class="note"></p></div>
  <div class="section">
    <h2 id="settings-title"></h2>
    <div class="field"><label id="project-label" for="project-name"></label><input id="project-name" type="text"></div>
    <div class="field"><label id="step-label"></label><div id="step-row" class="step-row"></div></div>
  </div>
  <div class="section">
    <h2 id="ops-title"></h2>
    <div class="button-row"><button id="add-node-button" class="primary" type="button"></button><button id="connect-button" type="button"></button><button id="cancel-connect-button" class="hidden" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="delete-selected-button" class="danger" type="button"></button><button id="reset-sample-button" type="button"></button></div>
  </div>
  <div class="section">
    <h2 id="io-title"></h2>
    <div class="button-row two"><button id="save-button" type="button"></button><button id="load-button" type="button"></button></div>
    <input id="load-input" class="hidden" type="file" accept=".json,application/json">
    <p id="io-note" class="note"></p>
  </div>
  <div class="section"><h2 id="help-title"></h2><ul id="help-list"></ul></div>
</aside>
<main class="canvas-panel">
  <div class="canvas-toolbar"><div><h2 id="canvas-title" style="margin:0"></h2><div id="connect-guide" class="note"></div></div><div class="status"><span id="summary-step-badge" class="badge"></span><span id="summary-project-badge" class="badge"></span><span id="summary-count-badge" class="badge"></span></div></div>
  <div class="diagram"><div id="diagram-surface" class="surface"><svg id="edge-layer" class="edge-layer" aria-hidden="true"><defs><marker id="arrow-end-marker" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6a5d50"></path></marker><marker id="arrow-start-marker" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#6a5d50"></path></marker><marker id="arrow-end-marker-selected" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e6d8c"></path></marker><marker id="arrow-start-marker-selected" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#1e6d8c"></path></marker></defs></svg></div></div>
</main>
<aside class="panel right">
  <div class="section">
    <h2 id="detail-title"></h2>
    <div id="empty-selection" class="empty"></div>
    <div id="node-editor" class="hidden"><h3 id="node-edit-title"></h3><div class="field"><label id="node-cat-label" for="node-category"></label><select id="node-category"></select></div><div class="field"><label id="node-title-label" for="node-title"></label><input id="node-title" type="text"></div><div class="field"><label id="node-meaning-label" for="node-meaning"></label><textarea id="node-meaning"></textarea></div><div class="field"><label id="node-note-label" for="node-customer-note"></label><textarea id="node-customer-note"></textarea></div><div class="summary"><div><strong>ID:</strong> <span id="node-id"></span></div><div><strong id="pos-strong"></strong> <span id="node-position"></span></div><div><strong id="size-strong"></strong> <span id="node-size"></span></div></div></div>
    <div id="edge-editor" class="hidden"><h3 id="edge-edit-title"></h3><div class="field"><label id="edge-type-label" for="edge-relation-type"></label><select id="edge-relation-type"></select></div><div class="field"><label id="edge-label-label" for="edge-label"></label><textarea id="edge-label"></textarea></div><div class="field"><label for="edge-arrow-start">arrowStart</label><select id="edge-arrow-start"></select></div><div class="field"><label for="edge-arrow-end">arrowEnd</label><select id="edge-arrow-end"></select></div><div class="summary"><div><strong>ID:</strong> <span id="edge-id"></span></div><div><strong id="from-strong"></strong> <span id="edge-from"></span></div><div><strong id="to-strong"></strong> <span id="edge-to"></span></div></div></div>
  </div>
  <div class="section"><h2 id="summary-title"></h2><div id="state-summary" class="summary"></div></div>
  <div class="section"><h2 id="step-result-title"></h2><p id="step-result-note" class="note"></p></div>
</aside>
</div>
<script>
(()=>{"use strict";
const T={appTitle:"\u8981\u4ef6\u30fb\u95a2\u4fc2\u6574\u7406\u30c4\u30fc\u30eb",appDesc:"\u7bb1\u3068\u7dda\u3067\u6574\u7406\u3057\u306a\u304c\u3089\u3001\u9014\u4e2d\u72b6\u614b\u3092\u4fdd\u5b58\u3067\u304d\u308b\u30ed\u30fc\u30ab\u30eb\u30c4\u30fc\u30eb\u3067\u3059\u3002",settings:"\u57fa\u672c\u8a2d\u5b9a",project:"\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u540d",projectPh:"\u4f8b: \u9867\u5ba2\u7ba1\u7406\u30b7\u30b9\u30c6\u30e0\u6574\u7406",step:"\u73fe\u5728STEP",ops:"\u64cd\u4f5c",addNode:"\u7bb1\u3092\u8ffd\u52a0",connect:"\u7dda\u63a5\u7d9a\u3092\u958b\u59cb",cancelConnect:"\u7dda\u63a5\u7d9a\u3092\u3084\u3081\u308b",deleteSel:"\u9078\u629e\u4e2d\u3092\u524a\u9664",reset:"\u30b5\u30f3\u30d7\u30eb\u306b\u623b\u3059",io:"\u4fdd\u5b58\u3068\u8aad\u8fbc",save:"JSON\u4fdd\u5b58",load:"JSON\u8aad\u8fbc",ioNote:"\u4fdd\u5b58\u3059\u308b\u3068\u3001\u73fe\u5728\u306eSTEP\u3001\u7bb1\u3001\u7dda\u3001\u4f4d\u7f6e\u60c5\u5831\u3092\u307e\u3068\u3081\u3066\u6b8b\u305b\u307e\u3059\u3002",help:"\u4f7f\u3044\u65b9",helpItems:["\u300c\u7bb1\u3092\u8ffd\u52a0\u300d\u3067\u65b0\u3057\u3044\u7bb1\u3092\u7f6e\u3051\u307e\u3059\u3002","\u7bb1\u3092\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u53f3\u5074\u3067\u5185\u5bb9\u3092\u7de8\u96c6\u3067\u304d\u307e\u3059\u3002","\u7bb1\u3092\u30c9\u30e9\u30c3\u30b0\u3059\u308b\u3068\u4f4d\u7f6e\u3092\u52d5\u304b\u305b\u307e\u3059\u3002","\u300c\u7dda\u63a5\u7d9a\u3092\u958b\u59cb\u300d\u306e\u5f8c\u306b\u3001\u59cb\u70b9\u306e\u7bb1\u3001\u7d42\u70b9\u306e\u7bb1\u306e\u9806\u3067\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u7dda\u304c\u4f5c\u3089\u308c\u307e\u3059\u3002","\u4fdd\u5b58\u3057\u305fJSON\u306f\u300cJSON\u8aad\u8fbc\u300d\u3067\u5143\u306b\u623b\u305b\u307e\u3059\u3002"],canvas:"\u56f3\u30a8\u30ea\u30a2",guide:"\u7bb1\u3092\u9078\u3076\u3068\u5185\u5bb9\u3092\u78ba\u8a8d\u30fb\u7de8\u96c6\u3067\u304d\u307e\u3059\u3002",projectUnset:"\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u540d\u672a\u8a2d\u5b9a",detail:"\u8a73\u7d30\u7de8\u96c6",em function bind(){el.projectName.addEventListener("input",e=>{state.projectName=e.target.value;renderSummary()});el.addNodeButton.addEventListener("click",addNode);el.connectButton.addEventListener("click",()=>{state.connectEnabled=true;state.connectFromId=null;render()});el.cancelConnectButton.addEventListener("click",()=>{state.connectEnabled=false;state.connectFromId=null;render()});el.deleteSelectedButton.addEventListener("click",deleteSelected);el.resetSampleButton.addEventListener("click",()=>{if(confirm("\u73fe\u5728\u306e\u5185\u5bb9\u3092\u30b5\u30f3\u30d7\u30eb\u30c7\u30fc\u30bf\u306b\u623b\u3057\u307e\u3059\u3002\u3088\u308d\u3057\u3044\u3067\u3059\u304b\u3002")){loadGraph(sample());render()}});el.saveButton.addEventListener("click",saveJson);el.loadButton.addEventListener("click",()=>el.loadInput.click());el.loadInput.addEventListener("change",loadJson);el.nodeCategory.addEventListener("change",()=>patchNode({category:el.nodeCategory.value}));el.nodeTitle.addEventListener("input",()=>patchNode({title:el.nodeTitle.value}));el.nodeMeaning.addEventListener("input",()=>patchNode({meaning:el.nodeMeaning.value}));el.nodeCustomerNote.addEventListener("input",()=>patchNode({customerNote:el.nodeCustomerNote.value}));el.edgeRelationType.addEventListener("change",()=>patchEdge({relationType:el.edgeRelationType.value}));el.edgeLabel.addEventListener("input",()=>patchEdge({label:el.edgeLabel.value}));el.edgeArrowStart.addEventListener("change",()=>patchEdge({arrowStart:el.edgeArrowStart.value}));el.edgeArrowEnd.addEventListener("change",()=>patchEdge({arrowEnd:el.edgeArrowEnd.value}));el.diagramSurface.addEventListener("mousedown",e=>{if(e.target===el.diagramSurface||e.target===el.edgeLayer){state.selected={type:null,id:null};render()}});window.addEventListener("mousemove",moveDrag);window.addEventListener("mouseup",()=>state.drag=null)}function loadGraph(data){state.version=1;state.projectName=data.projectName||"";state.currentStep=STEPS.includes(data.currentStep)?data.currentStep:"STEP1";state.nodes=(data.nodes||[]).map(n=>({id:n.id,category:CATS.includes(n.category)?n.category:CATS[0],title:n.title||"",meaning:n.meaning||"",customerNote:n.customerNote||"",x:+n.x||120,y:+n.y||120,width:+n.width||220,height:+n.height||140}));const ids=new Set(state.nodes.map(n=>n.id));state.edges=(data.edges||[]).filter(e=>ids.has(e.fromId)&&ids.has(e.toId)).map(e=>({id:e.id,fromType:e.fromType||"node",fromId:e.fromId,toType:e.toType||"node",toId:e.toId,relationType:REL.includes(e.relationType)?e.relationType:REL[0],label:e.label||"",arrowStart:e.arrowStart==="arrow"?"arrow":"none",arrowEnd:e.arrowEnd==="arrow"?"arrow":"none"}));state.selected={type:null,id:null};state.connectEnabled=false;state.connectFromId=null;state.counters.node=nextId(state.nodes.map(n=>n.id),"node");state.counters.edge=nextId(state.edges.map(e=>e.id),"edge")}
function nextId(ids,p){let m=0;ids.forEach(id=>{const x=new RegExp(`^${p}-(\\d+)$`).exec(id);if(x)m=Math.max(m,+x[1])});return m+1}function uid(p){let c;do{c=`${p}-${state.counters[p]++}`}while(state.nodes.some(n=>n.id===c)||state.edges.some(e=>e.id===c));return c}
function addNode(){const id=uid("node");state.nodes.push({id,category:CATS[0],title:"\u65b0\u3057\u3044\u7bb1",meaning:"",customerNote:"",x:140+(state.nodes.length%4)*44,y:120+state.nodes.length*34,width:220,height:140});state.selected={type:"node",id};render()}
function nodeSel(){return state.selected.type==="node"?state.nodes.find(n=>n.id===state.selected.id):null}function edgeSel(){return state.selected.type==="edge"?state.edges.find(e=>e.id===state.selected.id):null}function patchNode(p){const n=nodeSel();if(!n)return;Object.assign(n,p);render()}function patchEdge(p){const e=edgeSel();if(!e)return;Object.assign(e,p);render()}
function deleteSelected(){if(state.selected.type==="node"){const id=state.selected.id;state.nodes=state.nodes.filter(n=>n.id!==id);state.edges=state.edges.filter(e=>e.fromId!==id&&e.toId!==id);if(state.connectFromId===id)state.connectFromId=null}else if(state.selected.type==="edge"){state.edges=state.edges.filter(e=>e.id!==state.selected.id)}state.selected={type:null,id:null};render()}
function saveJson(){const d={version:1,projectName:state.projectName,currentStep:state.currentStep,nodes:state.nodes,edges:state.edges};const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(state.projectName||"project").replace(/[\\/:*?"<>|]/g,"_")+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href)}
function loadJson(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{loadGraph(JSON.parse(String(r.result)));render()}catch{alert("JSON\u306e\u8aad\u8fbc\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u5185\u5bb9\u3092\u78ba\u8a8d\u3057\u3066\u304f\u3060\u3055\u3044\u3002")}finally{el.loadInput.value=""}};r.readAsText(f,"utf-8")}
function render(){renderSteps();if(el.projectName.value!==state.projectName)el.projectName.value=state.projectName;renderEdges();renderNodes();renderEditors();renderSummary();renderGuide()}
function renderSteps(){el.stepRow.innerHTML="";STEPS.forEach(s=>{const b=document.createElement("button");b.type="button";b.textContent=s;if(s===state.currentStep)b.classList.add("active");b.addEventListener("click",()=>{state.currentStep=s;render()});el.stepRow.appendChild(b)})}
function renderNodes(){Array.from(el.diagramSurface.querySelectorAll(".node")).forEach(n=>n.remove());state.nodes.forEach(n=>{const d=document.createElement("div");d.className=`node${state.selected.type==="node"&&state.selected.id===n.id?" sel":""}${state.connectFromId===n.id?" src":""}`;d.style.left=n.x+"px";d.style.top=n.y+"px";d.style.width=n.width+"px";d.style.height=n.height+"px";d.innerHTML=`<div class="node-header"><div class="node-title">${esc(n.title||"\u30bf\u30a4\u30c8\u30eb\u672a\u5165\u529b")}</div><span class="node-cat">${esc(n.category)}</span></div><div class="node-body"><div><strong>${T.meaning}:</strong><br>${esc(n.meaning||"\u672a\u5165\u529b")}</div><div><strong>${T.note}:</strong><br>${esc(n.customerNote||"\u672a\u5165\u529b")}</div></div>`;d.addEventListener("mousedown",ev=>{ev.stopPropagation();downNode(ev,n.id)});el.diagramSurface.appendChild(d)})}
function renderEdges(){const defs=el.edgeLayer.querySelector("defs");el.edgeLayer.innerHTML="";el.edgeLayer.appendChild(defs);state.edges.forEach(e=>{const a=state.nodes.find(n=>n.id===e.fromId),b=state.nodes.find(n=>n.id===e.toId);if(!a||!b)return;const p1={x:a.x+a.width/2,y:a.y+a.height/2},p2={x:b.x+b.width/2,y:b.y+b.height/2},sel=state.selected.type==="edge"&&state.selected.id===e.id,col=sel?"#1e6d8c":"#6a5d50";const hit=document.createElementNS("http://www.w3.org/2000/svg","line");["x1","y1","x2","y2"].forEach((k,i)=>hit.setAttribute(k,[p1.x,p1.y,p2.x,p2.y][i]));hit.setAttribute("stroke","transparent");hit.setAttribute("stroke-width","18");hit.style.cursor="pointer";hit.addEventListener("mousedown",ev=>{ev.stopPropagation();state.selected={type:"edge",id:e.id};render()});const line=document.createElementNS("http://www.w3.org/2000/svg","line");["x1","y1","x2","y2"].forEach((k,i)=>line.setAttribute(k,[p1.x,p1.y,p2.x,p2.y][i]));line.setAttribute("stroke",col);line.setAttribute("stroke-width",sel?"3.5":"2.5");if(e.arrowStart==="arrow")line.setAttribute("marker-start",`url(#${sel?"arrow-start-marker-selected":"arrow-start-marker"})`);if(e.arrowEnd==="arrow")line.setAttribute("marker-end",`url(#${sel?"arrow-end-marker-selected":"arrow-end-marker"})`);const text=document.createElementNS("http://www.w3.org/2000/svg","text");text.setAttribute("x",String((p1.x+p2.x)/2));text.setAttribute("y",String((p1.y+p2.y)/2-8));text.setAttribute("text-anchor","middle");text.setAttribute("font-size","12");text.setAttribute("font-family",'"Yu Gothic UI", sans-serif');text.setAttribute("fill",col);text.textContent=e.label||e.relationType;el.edgeLayer.append(hit,line,text)})}
function downNode(ev,id){const n=state.nodes.find(v=>v.id===id);if(!n)return;if(state.connectEnabled){if(!state.connectFromId){state.connectFromId=id;state.selected={type:"node",id};render();return}if(state.connectFromId===id){state.connectFromId=null;render();return}if(state.edges.some(e=>e.fromId===state.connectFromId&&e.toId===id)){alert("\u540c\u3058\u5411\u304d\u306e\u7dda\u306f\u3059\u3067\u306b\u3042\u308a\u307e\u3059\u3002")}else{const eid=uid("edge");state.edges.push({id:eid,fromType:"node",fromId:state.connectFromId,toType:"node",toId:id,relationType:REL[0],label:"",arrowStart:"none",arrowEnd:"arrow"});state.selected={type:"edge",id:eid}}state.connectFromId=null;render();return}state.selected={type:"node",id};state.drag={nodeId:id,dx:ev.clientX-n.x,dy:ev.clientY-n.y};render()}
function moveDrag(ev){if(!state.drag)return;const n=state.nodes.find(v=>v.id===state.drag.nodeId);if(!n)return;n.x=Math.max(0,Math.min(1800-n.width,ev.clientX-state.drag.dx));n.y=Math.max(0,Math.min(1200-n.height,ev.clientY-state.drag.dy));renderEdges();renderNodes();renderEditors();renderSummary()}
function renderEditors(){const n=nodeSel(),e=edgeSel();el.emptySelection.classList.toggle("hidden",!!(n||e));el.nodeEditor.classList.toggle("hidden",!n);el.edgeEditor.classList.toggle("hidden",!e);if(n){el.nodeCategory.value=n.category;el.nodeTitle.value=n.title;el.nodeMeaning.value=n.meaning;el.nodeCustomerNote.value=n.customerNote;el.nodeId.textContent=n.id;el.nodePosition.textContent=`${Math.round(n.x)}, ${Math.round(n.y)}`;el.nodeSize.textContent=`${Math.round(n.width)} x ${Math.round(n.height)}`}if(e){el.edgeRelationType.value=e.relationType;el.edgeLabel.value=e.label;el.edgeArrowStart.value=e.arrowStart;el.edgeArrowEnd.value=e.arrowEnd;el.edgeId.textContent=e.id;el.edgeFrom.textContent=nameOf(e.fromId);el.edgeTo.textContent=nameOf(e.toId)}}
function nameOf(id){const n=state.nodes.find(v=>v.id===id);return n?`${n.title||"\u30bf\u30a4\u30c8\u30eb\u672a\u5165\u529b"} (${n.id})`:id}function renderSummary(){el.summaryStepBadge.textContent=state.currentStep;el.summaryProjectBadge.textContent=state.projectName||T.projectUnset;el.summaryCountBadge.textContent=`\u7bb1 ${state.nodes.length} / \u7dda ${state.edges.length}`;const sel=state.selected.type==="node"?`\u9078\u629e\u4e2d\u306e\u7bb1: ${nameOf(state.selected.id)}`:state.selected.type==="edge"?`\u9078\u629e\u4e2d\u306e\u7dda: ${state.selected.id}`:"\u9078\u629e\u4e2d: \u306a\u3057";el.stateSummary.innerHTML=`<div><strong>${T.project}:</strong> ${esc(state.projectName||"\u672a\u5165\u529b")}</div><div><strong>${T.step}:</strong> ${esc(state.currentStep)}</div><div><strong>\u7bb1\u306e\u6570:</strong> ${state.nodes.length}</div><div><strong>\u7dda\u306e\u6570:</strong> ${state.edges.length}</div><div><strong>\u63a5\u7d9a\u30e2\u30fc\u30c9:</strong> ${esc(state.connectEnabled?(state.connectFromId?`\u59cb\u70b9\u9078\u629e\u6e08\u307f (${nameOf(state.connectFromId)})`:"\u59cb\u70b9\u5f85\u3061"):"\u30aa\u30d5")}</div><div><strong>${esc(sel)}</strong></div>`}
function renderGuide(){el.cancelConnectButton.classList.toggle("hidden",!state.connectEnabled);el.connectButton.classList.toggle("active",state.connectEnabled);el.connectGuide.textContent=!state.connectEnabled?T.guide:!state.connectFromId?"\u7dda\u63a5\u7d9a\u4e2d\u3067\u3059\u3002\u59cb\u70b9\u306b\u3057\u305f\u3044\u7bb1\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u304f\u3060\u3055\u3044\u3002":`\u59cb\u70b9\u3092\u9078\u629e\u3057\u307e\u3057\u305f: ${nameOf(state.connectFromId)}\u3002\u6b21\u306b\u7d42\u70b9\u306e\u7bb1\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u304f\u3060\u3055\u3044\u3002`}
function esc(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;").replace(/\n/g,"<br>")}
fill(el.nodeCategory,CATS);fill(el.edgeRelationType,REL);fillArrows(el.edgeArrowStart);fillArrows(el.edgeArrowEnd);txt();bind();loadGraph(sample());render();})();
