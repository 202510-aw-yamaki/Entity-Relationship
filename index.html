}.node-cat{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.node[data-category-index="0"] .node-header{background:linear-gradient(180deg,#f9e4db 0%,#fff7f3 100%);border-bottom-color:#e4bcac}.node[data-category-index="0"] .node-cat{background:#f5dbd0;border-color:#dfb0a0;color:#7a4233}.node[data-category-index="1"] .node-header{background:linear-gradient(180deg,#e6f1fb 0%,#f7fbff 100%);border-bottom-color:#bdd4ea}.node[data-category-index="1"] .node-cat{background:#dce9f8;border-color:#b6cee7;color:#355f88}.node[data-category-index="2"] .node-header{background:linear-gradient(180deg,#e5f4f0 0%,#f7fcfb 100%);border-bottom-color:#b9d8cf}.node[data-category-index="2"] .node-cat{background:#d8ece6;border-color:#acd0c3;color:#2f6b5d}.node[data-category-index="3"] .node-header{background:linear-gradient(180deg,#f1e6db 0%,#fbf7f2 100%);border-bottom-color:#d8c0a5}.node[data-category-index="3"] .node-cat{background:#eadccf;border-color:#ccb08f;color:#77563a}.node[data-category-index="4"] .node-header{background:linear-gradient(180deg,#e8eef4 0%,#f8fafc 100%);border-bottom-color:#c1cfdb}.node[data-category-index="4"] .node-cat{background:#dce5ed;border-color:#b9cad8;color:#46627c}.node[data-category-index="5"] .node-header{background:linear-gradient(180deg,#e8f2e3 0%,#f7fbf5 100%);border-bottom-color:#bfd5b2}.node[data-category-index="5"] .node-cat{background:#dbe8d4;border-color:#b4cc9f;color:#476b37}.node[data-category-index="6"] .node-header{background:linear-gradient(180deg,#f1ebe4 0%,#fbf9f6 100%);border-bottom-color:#d7cabd}.node[data-category-index="6"] .node-cat{background:#e8dfd5;border-color:#cfbfae;color:#6f5a46}.node-body{display:grid;gap:8px;font-size:12px;color:var(--muted);flex:1 1 auto;min-height:0;overflow:auto;align-content:start;padding-right:4px}.node-body div{min-width:0;padding-top:6px;border-top:1px solid #f0e5d9;overflow-wrap:anywhere;word-break:break-word}.node-items{min-width:0;padding-top:6px;border-top:1px solid #f0e5d9}.node-items strong{display:block;margin-bottom:6px;color:var(--text)}.item-chip-list{display:grid;gap:6px;min-width:0}.item-chip{min-width:0;padding:6px 8px;border:1px solid #ddd0c2;border-radius:10px;background:#f8f3ec;color:var(--text);line-height:1.45;cursor:pointer;overflow:hidden}.item-chip.sel{border-color:var(--selected);box-shadow:0 0 0 2px rgba(30,109,140,.12)}.item-chip.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.item-chip-title{font-weight:700;overflow-wrap:anywhere;word-break:break-word}.item-chip-desc{font-size:11px;color:var(--muted);overflow-wrap:anywhere;word-break:break-word}.items-editor{display:grid;gap:8px}.item-card{padding:10px;border:1px solid #e2d6c8;border-radius:12px;background:#fffaf5}.item-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.item-id{font-size:11px;color:var(--muted)}.item-empty{padding:10px;border:1px dashed #d8cab9;border-radius:10px;background:#fffaf4;color:var(--muted);font-size:12px;line-height:1.6}.empty{padding:18px;border:1px dashed #ccb9a2;border-radius:12px;background:#fffaf4;color:var(--muted);line-height:1.7}.summary{display:grid;gap:8px;font-size:13px}.summary strong{color:var(--text)}.summary-card{padding:10px 12px;border:1px solid #eadfce;border-radius:12px;background:#fffaf4}.summary-grid{display:grid;gap:8px;grid-template-columns:1fr 1fr}.summary-chip{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;border:1px solid #dbc7b2;background:#f7efe4;color:#6e5642;font-size:12px}.help-list{margin:0;padding-left:18px;display:grid;gap:8px;font-size:13px;line-height:1.6}.result-block{padding:10px 12px;border:1px solid #eadfce;border-radius:12px;background:#fffaf4}.result-status{margin:0 0 8px;padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.6}.result-status.ok{background:var(--ok-bg);color:var(--ok-text);border:1px solid #cfe2d2}.result-status.warn{background:var(--warn-bg);color:var(--warn-text);border:1px solid #efd5b5}.result-list{margin:0;padding-left:18px;display:grid;gap:6px}.note{font-size:12px;line-height:1.6;color:var(--muted)}.hidden{display:none!important}@media (max-width:1200px){.app{grid-template-columns:280px minmax(0,1fr)}.panel.right{grid-column:1/-1;border-left:none;border-top:1px solid var(--line)}}@media (max-width:860px){.app{grid-template-columns:1fr}.panel,.panel.right{border:none;border-bottom:1px solid var(--line)}.canvas-panel{min-height:60vh}.summary-grid{grid-template-columns:1fr}}

<style>

.panel{position:relative;height:100vh;overflow:auto}

.node.src::after{content:"始点";color:var(--accent)}

.resize-handle::before{content:"";position:absolute;right:3px;bottom:3px;width:7px;height:7px;border-right:2px solid var(--selected);border-bottom:2px solid var(--selected)}
.edge-preview-line{stroke:var(--accent);stroke-width:2.5;stroke-dasharray:10 7;fill:none;pointer-events:none}
.edge-preview-line.item{stroke:#b06a3c}

.start-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}

<body>
<div id="start-screen" class="start-screen hidden" aria-hidden="true">
  <div class="start-screen-backdrop"></div>
  <div class="start-screen-panel">
    <div class="start-screen-head">
      <div>
        <h2 id="start-screen-title"></h2>

      <button id="start-screen-close" class="hidden" type="button"></button>

  - title: string
  - meaning: string
  - customerNote: string
  - x: number
  - y: number
  - width: number
  - height: number
  - isGroup: boolean
  - parentId: string
  - items: array

  - id: string

  - id: string

  - id は重複させません。
  - fromId / toId は実在する id だけを参照させます。
  - isGroup: true の node は親箱なので parentId は空文字にします。
  - 通常箱だけが parentId を持てます。
  - parentId は実在する親箱 id だけを指します。

分からない部分は空文字、仮タイトル、注釈カテゴリ、関連線で安全側に置いてかまいません。

function runStep1Validation(){const results=[];const missingCats=MAIN_STEP1_CATS.filter(cat=>!state.nodes.some(node=>node.category===cat));missingCats.forEach(cat=>results.push(`\u3053\u306e\u30ab\u30c6\u30b4\u30ea\u306e\u7bb1\u304c\u73fe\u5728\u3042\u308a\u307e\u305b\u3093: ${cat}`));const noCategoryNodes=state.nodes.filter(node=>!node.category);if(noCategoryNodes.length){const names=noCategoryNodes.map(node=>node.title?node.title:node.id);results.push(names.length===1?`\u30ab\u30c6\u30b4\u30ea\u672a\u8a2d\u5b9a\u306e\u7bb1\u304c\u3042\u308a\u307e\u3059: ${names[0]}`:`\u30ab\u30c6\u30b4\u30ea\u672a\u8a2d\u5b9a\u306e\u7bb1\u304c\u3042\u308a\u307e\u3059: ${names.join("\u3001")}`)}const noTitleNodes=state.nodes.filter(node=>!node.title.trim());if(noTitleNodes.length){const names=noTitleNodes.map(node=>node.category||node.id);results.push(names.length===1?`\u30bf\u30a4\u30c8\u30eb\u304c\u672a\u5165\u529b\u306e\u7bb1\u304c\u3042\u308a\u307e\u3059: ${names[0]}`:`\u30bf\u30a4\u30c8\u30eb\u304c\u672a\u5165\u529b\u306e\u7bb1\u304c\u3042\u308a\u307e\u3059: ${names.join("\u3001")}`)}state.nodes.forEach(node=>(node.items||[]).filter(item=>!item.title.trim()).forEach(item=>results.push(`\u3053\u306e\u7bb1\u5185\u8981\u4ef6\u306f\u8981\u4ef6\u540d\u304c\u672a\u5165\u529b\u3067\u3059: ${(node.title||node.id)} / ${item.id}`)));if(!state.edges.length)results.push("\u307e\u3060\u7dda\u304c1\u672c\u3082\u3042\u308a\u307e\u305b\u3093\u3002\u7bb1\u540c\u58eb\u306e\u95a2\u4fc2\u304c\u308f\u304b\u308b\u3088\u3046\u306b\u7dda\u3092\u3064\u306a\u3044\u3067\u304f\u3060\u3055\u3044\u3002");const connectedIds=new Set();state.edges.forEach(edge=>{if(edge.fromType==="node")connectedIds.add(edge.fromId);if(edge.toType==="node")connectedIds.add(edge.toId)});state.nodes.filter(node=>!node.isGroup&&!connectedIds.has(node.id)).forEach(node=>{results.push(`\u3053\u306e\u7bb1\u306f\u72ec\u7acb\u3057\u3066\u3044\u307e\u3059: ${node.title||node.id}`)});state.step1Results=results;state.step1Ran=true;stat function runStep2Validation(){const strong=[];const normal=[];const saveNodes=state.nodes.filter(node=>node.category===CATS[3]);const refNodes=state.nodes.filter(node=>node.category===CATS[4]);const viewNodes=state.nodes.filter(node=>node.category===CATS[1]);const inputNodes=state.nodes.filter(node=>node.category===CATS[2]);const saveEdges=state.edges.filter(edge=>edge.relationType===REL[2]);const refEdges=state.edges.filter(edge=>edge.relationType===REL[3]);const displayEdges=state.edges.filter(edge=>edge.relationType===REL[0]);const outputEdges=state.edges.filter(edge=>edge.relationType===REL[4]);if(saveNodes.length&&!saveEdges.length)strong.push("\u5f37\u3044\u6ce8\u610f: \u4fdd\u5b58\u30c7\u30fc\u30bf\u306e\u7bb1\u306f\u3042\u308a\u307e\u3059\u304c\u3001\u4fdd\u5b58\u306e\u7dda\u304c\u307e\u3060\u3042\u308a\u307e\u305b\u3093\u3002");if(refNodes.length&&!refEdges.length)strong.push("\u5f37\u3044\u6ce8\u610f: \u53c2\u7167\u30c7\u30fc\u30bf\u306e\u7bb1\u306f\u3042\u308a\u307e\u3059\u304c\u3001\u53c2\u7167\u306e\u7dda\u304c\u307e\u3060\u3042\u308a\u307e\u305b\u3093\u3002");saveNodes.forEach(node=>{const incomingSave=saveEdges.some(edge=>edge.toType==="node"&&edge.toId===node.id);if(!incomingSave)strong.push(`\u5f37\u3044\u6ce8\u610f: \u4fdd\u5b58\u5148\u306f\u3042\u308a\u307e\u3059\u304c\u3001\u3069\u3053\u304b\u3089\u4fdd\u5b58\u3055\u308c\u308b\u304b\u304c\u4e0d\u660e\u3067\u3059: ${node.title||node.id}`)});refNodes.forEach(node=>{const outgoingRef=refEdges.some(edge=>edge.fromType==="node"&&edge.fromId===node.id);if(!outgoingRef)strong.push(`\u5f37\u3044\u6ce8\u610f: \u53c2\u7167\u5148\u306f\u3042\u308a\u307e\u3059\u304c\u3001\u3069\u3053\u3067\u53c2\u7167\u3055\u308c\u308b\u304b\u304c\u4e0d\u660e\u3067\u3059: ${node.title||node.id}`)});viewNodes.forEach(node=>{const hasRefSource=refEdges.some(edge=>edge.toType==="node"&&edge.toId===node.id);const hasDisplaySource=displayEdges.some(edge=>edge.toType==="node"&&edge.toId===node.id);if(!hasRefSource&&!hasDisplaySour
