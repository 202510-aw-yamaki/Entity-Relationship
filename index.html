<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>app</title>
<style>
:root{--line:#cfc4b8;--text:#2f2a24;--muted:#6e655c;--accent:#9d5c37;--selected:#1e6d8c;--danger:#ad3d2d;--canvas:#f8f5ef;--panel:#fffdf9;--shadow:0 10px 24px rgba(72,52,37,.08)}*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;background:linear-gradient(180deg,#efe7dc 0%,#f8f5ef 100%);color:var(--text)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;min-height:100vh}.panel{padding:18px;border-right:1px solid var(--line);background:rgba(255,253,249,.96)}.panel.right{border-right:none;border-left:1px solid var(--line)}.section{margin-bottom:18px;padding:14px;background:var(--panel);border:1px solid #e5dcd1;border-radius:14px;box-shadow:var(--shadow)}.section h1,.section h2,.section h3{margin:0 0 10px;line-height:1.3}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:13px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #cdbfab;border-radius:10px;padding:10px 12px;background:#fffdfa;color:var(--text)}textarea{min-height:96px;resize:vertical}.button-row,.step-row{display:grid;gap:8px}.button-row.two{grid-template-columns:1fr 1fr}button{border:1px solid #cdbfab;border-radius:10px;background:#fff8f1;color:var(--text);padding:10px 12px;cursor:pointer}button.primary{background:var(--accent);color:#fffaf5;border-color:var(--accent)}button.danger{background:#fff2ef;border-color:#d7aa9f;color:var(--danger)}button.active{background:#d7eef6;border-color:var(--selected);color:var(--selected);font-weight:700}.canvas-panel{display:grid;grid-template-rows:auto minmax(0,1fr);min-width:0;background:rgba(248,245,239,.92)}.canvas-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,253,249,.88)}.status{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.diagram{position:relative;overflow:auto;background:radial-gradient(circle at top left,rgba(157,92,55,.08),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0)),var(--canvas)}.surface{position:relative;width:1800px;height:1200px;background-image:linear-gradient(to right,rgba(135,111,88,.08) 1px,transparent 1px),linear-gradient(to bottom,rgba(135,111,88,.08) 1px,transparent 1px);background-size:24px 24px}.edge-layer{position:absolute;inset:0;width:100%;height:100%;overflow:visible}.node{position:absolute;border:2px solid #bda892;border-radius:14px;background:#fffdf9;box-shadow:var(--shadow);padding:12px;cursor:grab;user-select:none}.node.sel{border-color:var(--selected);box-shadow:0 0 0 3px rgba(30,109,140,.14),var(--shadow)}.node.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.node-header{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.node-title{font-weight:700;line-height:1.35;word-break:break-word}.node-cat{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;background:#efe5d7;color:#714e39;font-size:12px;border:1px solid #dbc7b2}.node-body{display:grid;gap:8px;font-size:12px;color:var(--muted)}.node-body div{padding-top:6px;border-top:1px solid #f0e5d9}.node-items{padding-top:6px;border-top:1px solid #f0e5d9}.node-items strong{display:block;margin-bottom:6px;color:var(--text)}.item-chip-list{display:grid;gap:6px}.item-chip{padding:6px 8px;border:1px solid #ddd0c2;border-radius:10px;background:#f8f3ec;color:var(--text);line-height:1.45;cursor:pointer}.item-chip.sel{border-color:var(--selected);box-shadow:0 0 0 2px rgba(30,109,140,.12)}.item-chip.src{border-style:dashed;border-color:var(--accent);background:#fff4ea}.item-chip-title{font-weight:700}.item-chip-desc{font-size:11px;color:var(--muted)}.items-editor{display:grid;gap:8px}.item-card{padding:10px;border:1px solid #e2d6c8;border-radius:12px;background:#fffaf5}.item-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.item-id{font-size:11px;color:var(--muted)}.item-empty{padding:10px;border:1px dashed #d8cab9;border-radius:10px;background:#fffaf4;color:var(--muted);font-size:12px;line-height:1.6}.empty{padding:18px;border:1px dashed #ccb9a2;border-radius:12px;background:#fffaf4;color:var(--muted);line-height:1.7}.summary{display:grid;gap:8px;font-size:13px}.summary strong{color:var(--text)}.note{font-size:12px;line-height:1.6;color:var(--muted)}.hidden{display:none!important}@media (max-width:1200px){.app{grid-template-columns:280px minmax(0,1fr)}.panel.right{grid-column:1/-1;border-left:none;border-top:1px solid var(--line)}}@media (max-width:860px){.app{grid-template-columns:1fr}.panel,.panel.right{border:none;border-bottom:1px solid var(--line)}.canvas-panel{min-height:60vh}}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
  <div class="section"><h1 id="app-title"></h1><p id="app-desc" class="note"></p></div>
  <div class="section">
    <h2 id="settings-title"></h2>
    <div class="field"><label id="project-label" for="project-name"></label><input id="project-name" type="text"></div>
    <div class="field"><label id="step-label"></label><div id="step-row" class="step-row"></div></div>
  </div>
  <div class="section">
    <h2 id="ops-title"></h2>
    <div class="button-row"><button id="add-node-button" class="primary" type="button"></button><button id="connect-button" type="button"></button><button id="cancel-connect-button" class="hidden" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="delete-selected-button" class="danger" type="button"></button><button id="reset-sample-button" type="button"></button></div>
    <div class="button-row" style="margin-top:8px"><button id="run-step1-button" type="button"></button><button id="run-step2-button" type="button"></button><button id="run-step3-button" type="button"></button></div>
  </div>
  <div class="section">
    <h2 id="io-title"></h2>
    <div class="button-row two"><button id="save-button" type="button"></button><button id="load-button" type="button"></button></div>
    <div class="button-row two" style="margin-top:8px"><button id="download-ai-button" type="button"></button><button id="download-human-button" type="button"></button></div>
    <input id="load-input" class="hidden" type="file" accept=".json,application/json">
    <p id="io-note" class="note"></p>
  </div>
  <div class="section"><h2 id="help-title"></h2><ul id="help-list"></ul></div>
</aside>
<main class="canvas-panel">
  <div class="canvas-toolbar"><div><h2 id="canvas-title" style="margin:0"></h2><div id="connect-guide" class="note"></div></div><div class="status"><span id="summary-step-badge" class="badge"></span><span id="summary-project-badge" class="badge"></span><span id="summary-count-badge" class="badge"></span></div></div>
  <div class="diagram"><div id="diagram-surface" class="surface"><svg id="edge-layer" class="edge-layer" aria-hidden="true"><defs><marker id="arrow-end-marker" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6a5d50"></path></marker><marker id="arrow-start-marker" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#6a5d50"></path></marker><marker id="arrow-end-marker-selected" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e6d8c"></path></marker><marker id="arrow-start-marker-selected" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 10 0 L 0 5 L 10 10 z" fill="#1e6d8c"></path></marker></defs></svg></div></div>
</main>
<aside class="panel right">
  <div class="section">
    <h2 id="detail-title"></h2>
    <div id="empty-selection" class="empty"></div>
    <div id="node-editor" class="hidden"><h3 id="node-edit-title"></h3><div class="field"><label id="node-cat-label" for="node-category"></label><select id="node-category"></select></div><div class="field"><label id="node-title-label" for="node-title"></label><input id="node-title" type="text"></div><div class="field"><label id="node-meaning-label" for="node-meaning"></label><textarea id="node-meaning"></textarea></div><div class="field"><label id="node-note-label" for="node-customer-note"></label><textarea id="node-customer-note"></textarea></div><div class="field"><label id="node-items-label"></label><p id="node-items-note" class="note"></p><button id="add-item-button" type="button"></button></div><div id="node-items-editor" class="items-editor"></div><div class="summary"><div><strong>ID:</strong> <span id="node-id"></span></div><div><strong id="pos-strong"></strong> <span id="node-position"></span></div><div><strong id="size-strong"></strong> <span id="node-size"></span></div></div></div>
    <div id="edge-editor" class="hidden"><h3 id="edge-edit-title"></h3><div class="field"><label id="edge-type-label" for="edge-relation-type"></label><select id="edge-relation-type"></select><p id="edge-type-note" class="note"></p></div><div class="field"><label id="edge-label-label" for="edge-label"></label><textarea id="edge-label"></textarea></div><div class="field"><label id="edge-arrow-start-label" for="edge-arrow-start"></label><select id="edge-arrow-start"></select></div><div class="field"><label id="edge-arrow-end-label" for="edge-arrow-end"></label><select id="edge-arrow-end"></select></div><div class="summary"><div><strong>ID:</strong> <span id="edge-id"></span></div><div><strong id="from-strong"></strong> <span id="edge-from"></span></div><div><strong id="to-strong"></strong> <span id="edge-to"></span></div></div></div>
  </div>
  <div class="section"><h2 id="summary-title"></h2><div id="state-summary" class="summary"></div></div>
  <div class="section"><h2 id="step-result-title"></h2><p id="step-result-note" class="note"></p><h3 id="step1-block-title"></h3><div id="step1-result-status" class="note"></div><ul id="step1-result-list" class="note"></ul><h3 id="step2-block-title"></h3><div id="step2-result-status" class="note"></div><ul id="step2-result-list" class="note"></ul><h3 id="step3-block-title"></h3><div id="step3-result-status" class="note"></div><ul id="step3-result-list" class="note"></ul></div>
</aside>
</div>
<script>
(()=>{"use strict";
const T={appTitle:"\u8981\u4ef6\u30fb\u95a2\u4fc2\u6574\u7406\u30c4\u30fc\u30eb",appDesc:"\u7bb1\u3068\u7dda\u3067\u6574\u7406\u3057\u306a\u304c\u3089\u3001\u9014\u4e2d\u72b6\u614b\u3092\u4fdd\u5b58\u3067\u304d\u308b\u30ed\u30fc\u30ab\u30eb\u30c4\u30fc\u30eb\u3067\u3059\u3002",settings:"\u57fa\u672c\u8a2d\u5b9a",project:"\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u540d",projectPh:"\u4f8b: \u9867\u5ba2\u7ba1\u7406\u30b7\u30b9\u30c6\u30e0\u6574\u7406",step:"\u73fe\u5728STEP",ops:"\u64cd\u4f5c",addNode:"\u7bb1\u3092\u8ffd\u52a0",connect:"\u7dda\u63a5\u7d9a\u3092\u958b\u59cb",cancelConnect:"\u7dda\u63a5\u7d9a\u3092\u3084\u3081\u308b",deleteSel:"\u9078\u629e\u4e2d\u3092\u524a\u9664",reset:"\u30b5\u30f3\u30d7\u30eb\u306b\u623b\u3059",runStep1:"STEP1\u5224\u5b9a\u3092\u5b9f\u884c",runStep2:"STEP2\u5224\u5b9a\u3092\u5b9f\u884c",runStep3:"STEP3\u5224\u5b9a\u3092\u5b9f\u884c",io:"\u4fdd\u5b58\u3068\u8aad\u8fbc",save:"JSON\u4fdd\u5b58",load:"JSON\u8aad\u8fbc",ioNote:"\u4fdd\u5b58\u3059\u308b\u3068\u3001\u73fe\u5728\u306eSTEP\u3001\u7bb1\u3001\u7dda\u3001\u4f4d\u7f6e\u60c5\u5831\u3092\u307e\u3068\u3081\u3066\u6b8b\u305b\u307e\u3059\u3002",help:"\u4f7f\u3044\u65b9",helpItems:["\u300c\u7bb1\u3092\u8ffd\u52a0\u300d\u3067\u65b0\u3057\u3044\u7bb1\u3092\u7f6e\u3051\u307e\u3059\u3002","\u7bb1\u3092\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u53f3\u5074\u3067\u5185\u5bb9\u3092\u7de8\u96c6\u3067\u304d\u307e\u3059\u3002","\u7bb1\u3092\u30c9\u30e9\u30c3\u30b0\u3059\u308b\u3068\u4f4d\u7f6e\u3092\u52d5\u304b\u305b\u307e\u3059\u3002","\u300c\u7dda\u63a5\u7d9a\u3092\u958b\u59cb\u300d\u306e\u5f8c\u306b\u3001\u59cb\u70b9\u306e\u7bb1\u3001\u7d42\u70b9\u306e\u7bb1\u306e\u9806\u3067\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u7dda\u304c\u4f5c\u3089\u308c\u307e\u3059\u3002","\u7dda\u63a5\u7d9a\u4e2d\u306b\u7bb1\u5185\u8981\u4ef6\u3092\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u3001\u7bb1\u5185\u8981\u4ef6\u540c\u58eb\u306e\u7dda\u3082\u4f5c\u3089\u308c\u307e\u3059\u3002","\u4fdd\u5b58\u3057\u305fJSON\u306f function runStep3Validation(withConfirm){const results=[];const shortMeaning=node=>node.meaning.trim().length<14;state.nodes.forEach(node=>{if(!node.customerNote.trim())results.push(`\u9867\u5ba2\u5411\u3051\u6ce8\u91c8\u304c\u672a\u5165\u529b\u306e\u7bb1\u304c\u3042\u308a\u307e\u3059: ${node.title||node.id}`);if(node.title.trim()&&shortMeaning(node))results.push(`\u3053\u306e\u7bb1\u306f\u30bf\u30a4\u30c8\u30eb\u3060\u3051\u3067\u3001\u610f\u5473\u5408\u3044\u306e\u8aac\u660e\u304c\u4e0d\u8db3\u3057\u3066\u3044\u307e\u3059: ${node.title||node.id}`);if(node.category===CATS[0]&&(!node.meaning.trim()||node.meaning.trim().length<18||!node.customerNote.trim()))results.push(`\u9867\u5ba2\u8981\u671b\u306a\u306e\u306b\u8aac\u660e\u4e0d\u8db3\u306e\u53ef\u80fd\u6027\u304c\u3042\u308a\u307e\u3059: ${node.title||node.id}`);if(STEP3_TARGET_CATS.includes(node.category)&&(!node.meaning.trim()||shortMeaning(node)))results.push(`\u3053\u306e${node.category}\u306e\u7bb1\u306f\u3001\u5f8c\u3067\u898b\u8fd4\u3057\u305f\u3068\u304d\u306b\u7406\u89e3\u3057\u3065\u3089\u3044\u53ef\u80fd\u6027\u304c\u3042\u308a\u307e\u3059: ${node.title||node.id}`)});state.edges.forEach(edge=>{if(!edge.label.trim())results.push(`\u3053\u306e\u7dda\u306f\u3064\u306a\u304c\u3063\u3066\u3044\u307e\u3059\u304c\u3001\u4f55\u306e\u95a2\u4fc2\u304b\u8aac\u660e\u304c\u3042\u308a\u307e\u305b\u3093: ${edge.id}`)});state.step3Results=results;state.step3Ran=true;state.step3Dirty=false;if(withConfirm&&results.length)return window.confirm(T.warnComplete);return true}
function render(){renderSteps();if(el.projectName.value!==state.projectName)el.projectName.value=state.projectName;renderNodes();renderEdges();renderEditors();renderSummary();renderGuide();renderStep1Results();renderStep2Results();renderStep3Results()}
function renderSteps(){el.stepRow.innerHTML="";STEPS.forEach(s=>{const b=document.createElement("button");b.type="button";b.textContent=s;if(s===state.currentStep)b.classList.add("active");b.addEventListener("click",()=>{if(s===state.currentStep)return;if(s==="STEP2"&&state.currentStep==="STEP1"){runStep1Validation();if(state.step1Results.length&&!window.confirm(T.warnStep2)){render();return}}if(s==="STEP3"){if(state.currentStep==="STEP1"){runStep1Validation();runStep2Validation();if((state.step1Results.length||state.step2Results.length)&&!window.confirm(T.warnStep3)){render();return}}else if(state.currentStep==="STEP2"){runStep2Validation();if(state.step2Results.length&&!window.confirm(T.warnStep3)){render();return}}}state.currentStep=s;render()});el.stepRow.appendChild(b)})}
function renderNodes(){Array.from(el.diagramSurface.querySelectorAll(".node")).forEach(n=>n.remove());state.nodes.forEach(n=>{const d=document.createElement("div");const itemList=(n.items||[]).length?`<div class="node-items"><strong>${T.itemsLabel}</strong><div class="item-chip-list">${(n.items||[]).map(item=>`<div class="item-chip${state.connectFromType==="item"&&state.connectFromId===item.id?" src":""}" data-item-id="${escAttr(item.id)}"><div class="item-chip-title">- ${esc(item.title||"\u672a\u5165\u529b")}</div>${item.description?`<div class="item-chip-desc">${esc(item.description)}</div>`:""}</div>`).join("")}</div></div>`:"";d.className=`node${state.selected.type==="node"&&state.selected.id===n.id?" sel":""}${state.connectFromType==="node"&&state.connectFromId===n.id?" src":""}`;d.style.left=n.x+"px";d.style.top=n.y+"px";d.style.width=n.width+"px";d.style.height=n.height+"px";d.innerHTML=`<div class="node-header"><div class="node-title">${esc(n.title||"\u30bf\u30a4\u30c8\u30eb\u672a\u5165\u529b")}</div><span class="node-cat">${esc(n.category||"\u672a\u8a2d\u5b9a")}</span></div><div class="node-body"><div><strong>${T.meaning}:</strong><br>${esc(n.meaning||"\u672a\u5165\u529b")}</div><div><strong>${T.note}:</strong><br>${esc(n.customerNote||"\u672a\u5165\u529b")}</div>${itemList}</div>`;d.addEventListener("mousedown",ev=>{ev.stopPropagation();downNode(ev,n.id)});Array.from(d.querySelectorAll(".item-chip")).forEach(itemEl=>itemEl.addEventListener("mousedown",ev=>{ev.stopPropagation();downItem(ev,n.id,itemEl.dataset.itemId)}));el.diagramSurface.appendChild(d)})}
function renderEdges(){const defs=el.edgeLayer.querySelector("defs");el.edgeLayer.innerHTML="";el.edgeLayer.appendChild(defs);state.edges.forEach(e=>{const p1=endpointCenter(e.fromType||"node",e.fromId),p2=endpointCenter(e.toType||"node",e.toId);if(!p1||!p2)return;const sel=state.selected.type==="edge"&&state.selected.id===e.id,itemEdge=e.fromType==="item"||e.toType==="item",col=sel?"#1e6d8c":itemEdge?"#b06a3c":"#6a5d50";const hit=document.createElementNS("http://www.w3.org/2000/svg","line");["x1","y1","x2","y2"].forEach((k,i)=>hit.setAttribute(k,[p1.x,p1.y,p2.x,p2.y][i]));hit.setAttribute("stroke","transparent");hit.setAttribute("stroke-width","18");hit.style.cursor="pointer";hit.addEventListener("mousedown",ev=>{ev.stopPropagation();state.selected={type:"edge",id:e.id};render()});const line=document.createElementNS("http://www.w3.org/2000/svg","line");["x1","y1","x2","y2"].forEach((k,i)=>line.setAttribute(k,[p1.x,p1.y,p2.x,p2.y][i]));line.setAttribute("stroke",col);line.setAttribute("stroke-width",sel?"3.5":"2.5");if(itemEdge)line.setAttribute("stroke-dasharray","7 5");if(e.arrowStart==="arrow")line.setAttribute("marker-start",`url(#${sel?"arrow-start-marker-selected":"arrow-start-marker"})`);if(e.arrowEnd==="arrow")line.setAttribute("marker-end",`url(#${sel?"arrow-end-marker-selected":"arrow-end-marker"})`);const text=document.createElementNS("http://www.w3.org/2000/svg","text");text.setAttribute("x",String((p1.x+p2.x)/2));text.setAttribute("y",String((p1.y+p2.y)/2-8));text.setAttribute("text-anchor","middle");text.setAttribute("font-size",itemEdge?"11":"12");text.setAttribute("font-family",'"Yu Gothic UI", sans-serif');text.setAttribute("fill",col);text.textContent=e.label||e.relationType;el.edgeLayer.append(hit,line,text)})}
function downNode(ev,id){const n=state.nodes.find(v=>v.id===id);if(!n)return;if(state.connectEnabled){if(!state.connectFromId){state.connectFromId=id;state.connectFromType="node";state.selected={type:"node",id};render();return}if(state.connectFromType!=="node"){alert("\u7bb1\u5185\u8981\u4ef6\u304b\u3089\u59cb\u3081\u305f\u3068\u304d\u306f\u3001\u6b21\u3082\u7bb1\u5185\u8981\u4ef6\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002");return}if(state.connectFromId===id){state.connectFromId=null;state.connectFromType=null;render();return}if(state.edges.some(e=>e.fromType==="node"&&e.fromId===state.connectFromId&&e.toType==="node"&&e.toId===id)){alert("\u540c\u3058\u5411\u304d\u306e\u7dda\u306f\u3059\u3067\u306b\u3042\u308a\u307e\u3059\u3002")}else{const eid=uid("edge");state.edges.push({id:eid,fromType:"node",fromId:state.connectFromId,toType:"node",toId:id,relationType:REL[0],label:"",arrowStart:"none",arrowEnd:"arrow"});markValidationDirty();state.selected={type:"edge",id:eid}}state.connectFromId=null;state.connectFromType=null;render();return}state.selected={type:"node",id};state.drag={nodeId:id,dx:ev.clientX-n.x,dy:ev.clientY-n.y};render()}
function downItem(ev,nodeId,itemId){if(state.connectEnabled){if(!state.connectFromId){state.connectFromId=itemId;state.connectFromType="item";state.selected={type:"node",id:nodeId};render();return}if(state.connectFromType!=="item"){alert("\u7bb1\u304b\u3089\u59cb\u3081\u305f\u3068\u304d\u306f\u3001\u6b21\u3082\u7bb1\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002");return}if(state.connectFromId===itemId){state.connectFromId=null;state.connectFromType=null;render();return}if(state.edges.some(e=>e.fromType==="item"&&e.fromId===state.connectFromId&&e.toType==="item"&&e.toId===itemId)){alert("\u540c\u3058\u5411\u304d\u306e\u7dda\u306f\u3059\u3067\u306b\u3042\u308a\u307e\u3059\u3002")}else{const eid=uid("edge");state.edges.push({id:eid,fromType:"item",fromId:state.connectFromId,toType:"item",toId:itemId,relationType:REL[0],label:"",arrowStart:"none",arrowEnd:"arrow"});markValidationDirty();state.selected={type:"edge",id:eid}}state.connectFromId=null;state.connectFromType=null;render();return}state.selected={type:"node",id:nodeId};render()}
function moveDrag(ev){if(!state.drag)return;const n=state.nodes.find(v=>v.id===state.drag.nodeId);if(!n)return;n.x=Math.max(0,Math.min(1800-n.width,ev.clientX-state.drag.dx));n.y=Math.max(0,Math.min(1200-n.height,ev.clientY-state.drag.dy));markValidationDirty();renderNodes();renderEdges();renderEditors();renderSummary();renderStep1Results();renderStep2Results();renderStep3Results()}
function renderEditors(){const n=nodeSel(),e=edgeSel();el.emptySelection.classList.toggle("hidden",!!(n||e));el.nodeEditor.classList.toggle("hidden",!n);el.edgeEditor.classList.toggle("hidden",!e);if(n){const items=Array.isArray(n.items)?n.items:[];el.nodeCategory.value=n.category;el.nodeTitle.value=n.title;el.nodeMeaning.value=n.meaning;el.nodeCustomerNote.value=n.customerNote;el.nodeId.textContent=n.id;el.nodePosition.textContent=`${Math.round(n.x)}, ${Math.round(n.y)}`;el.nodeSize.textContent=`${Math.round(n.width)} x ${Math.round(n.height)}`;el.nodeItemsEditor.innerHTML=items.length?items.map(item=>`<div class="item-card" data-item-id="${escAttr(item.id)}"><div class="item-card-head"><div class="item-id">${escAttr(item.id)}</div><button type="button" class="danger item-delete-button" data-item-id="${escAttr(item.id)}">${T.itemDelete}</button></div><div class="field"><label>${T.itemTitle}</label><input type="text" class="item-title-input" data-item-id="${escAttr(item.id)}" value="${escAttr(item.title)}"></div><div class="field"><label>${T.itemDescription}</label><textarea class="item-description-input" data-item-id="${escAttr(item.id)}">${escAttr(item.description)}</textarea></div></div>`).join(""):`<div class="item-empty">${T.itemEmpty}</div>`;Array.from(el.nodeItemsEditor.querySelectorAll(".item-title-input")).forEach(input=>input.addEventListener("input",event=>updateNodeItem(event.target.dataset.itemId,"title",event.target.value)));Array.from(el.nodeItemsEditor.querySelectorAll(".item-description-input")).forEach(input=>input.addEventListener("input",event=>updateNodeItem(event.target.dataset.itemId,"description",event.target.value)));Array.from(el.nodeItemsEditor.querySelectorAll(".item-delete-button")).forEach(button=>button.addEventListener("click",event=>removeNodeItem(event.target.dataset.itemId)))}else{el.nodeItemsEditor.innerHTML=""}if(e){el.edgeRelationType.value=e.relationType;el.edgeLabel.value=e.label;el.edgeArrowStart.value=e.arrowStart;el.edgeArrowEnd.value=e.arrowEnd;el.edgeId.textContent=e.id;el.edgeFrom.textContent=endpointName(e.fromType||"node",e.fromId);el.edgeTo.textContent=endpointName(e.toType||"node",e.toId)}}
function nameOf(id){const n=state.nodes.find(v=>v.id===id);return n?`${n.title||"\u30bf\u30a4\u30c8\u30eb\u672a\u5165\u529b"} (${n.id})`:id}function renderSummary(){el.summaryStepBadge.textContent=state.currentStep;el.summaryProjectBadge.textContent=state.projectName||T.projectUnset;el.summaryCountBadge.textContent=`\u7bb1 ${state.nodes.length} / \u7dda ${state.edges.length}`;const sel=state.selected.type==="node"?`\u9078\u629e\u4e2d\u306e\u7bb1: ${nameOf(state.selected.id)}`:state.selected.type==="edge"?`\u9078\u629e\u4e2d\u306e\u7dda: ${state.selected.id}`:"\u9078\u629e\u4e2d: \u306a\u3057";el.stateSummary.innerHTML=`<div><strong>${T.project}:</strong> ${esc(state.projectName||"\u672a\u5165\u529b")}</div><div><strong>${T.step}:</strong> ${esc(state.currentStep)}</div><div><strong>\u7bb1\u306e\u6570:</strong> ${state.nodes.length}</div><div><strong>\u7dda\u306e\u6570:</strong> ${state.edges.length}</div><div><strong>\u63a5\u7d9a\u30e2\u30fc\u30c9:</strong> ${esc(state.connectEnabled?(state.connectFromId?`\u59cb\u70b9\u9078\u629e\u6e08\u307f (${endpointName(state.connectFromType||"node",state.connectFromId)})`:"\u59cb\u70b9\u5f85\u3061"):"\u30aa\u30d5")}</div><div><strong>${esc(sel)}</strong></div>`}
function renderStep1Results(){el.step1ResultList.innerHTML="";if(!state.step1Ran){el.step1ResultStatus.textContent=T.step1NotRun;return}if(!state.step1Results.length){el.step1ResultStatus.textContent=state.step1Dirty?T.step1Dirty:T.step1Ok;return}el.step1ResultStatus.textContent=state.step1Dirty?T.step1Dirty:"STEP1\u3067\u6c17\u306b\u306a\u308b\u70b9\u304c\u3042\u308a\u307e\u3059\u3002";state.step1Results.forEach(message=>{const li=document.createElement("li");li.textContent=message;el.step1ResultList.appendChild(li)})}
function renderStep2Results(){el.step2ResultList.innerHTML="";if(!state.step2Ran){el.step2ResultStatus.textContent=T.step2NotRun;return}if(!state.step2Results.length){el.step2ResultStatus.textContent=state.step2Dirty?T.step2Dirty:T.step2Ok;return}el.step2ResultStatus.textContent=state.step2Dirty?T.step2Dirty:(state.step2StrongCount>0?T.step2StrongWarn:T.step2Warn);state.step2Results.forEach(message=>{const li=document.createElement("li");li.textContent=message;el.step2ResultList.appendChild(li)})}
function renderStep3Results(){el.step3ResultList.innerHTML="";if(!state.step3Ran){el.step3ResultStatus.textContent=T.step3NotRun;return}if(!state.step3Results.length){el.step3ResultStatus.textContent=state.step3Dirty?T.step3Dirty:T.step3Ok;return}el.step3ResultStatus.textContent=state.step3Dirty?T.step3Dirty:T.step3Warn;state.step3Results.forEach(message=>{const li=document.createElement("li");li.textContent=message;el.step3ResultList.appendChild(li)})}
function renderGuide(){el.cancelConnectButton.classList.toggle("hidden",!state.connectEnabled);el.connectButton.classList.toggle("active",state.connectEnabled);el.connectGuide.textContent=!state.connectEnabled?T.guide:!state.connectFromId?"\u7dda\u63a5\u7d9a\u4e2d\u3067\u3059\u3002\u59cb\u70b9\u306b\u3057\u305f\u3044\u7bb1\u307e\u305f\u306f\u7bb1\u5185\u8981\u4ef6\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u304f\u3060\u3055\u3044\u3002":state.connectFromType==="item"?`\u59cb\u70b9\u3092\u9078\u629e\u3057\u307e\u3057\u305f: ${endpointName("item",state.connectFromId)}\u3002\u6b21\u306b\u7d42\u70b9\u306e\u7bb1\u5185\u8981\u4ef6\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u304f\u3060\u3055\u3044\u3002`:`\u59cb\u70b9\u3092\u9078\u629e\u3057\u307e\u3057\u305f: ${endpointName("node",state.connectFromId)}\u3002\u6b21\u306b\u7d42\u70b9\u306e\u7bb1\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u304f\u3060\u3055\u3044\u3002`}
function escAttr(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;")}function esc(v){return escAttr(v).replace(/\n/g,"<br>")}
fill(el.nodeCategory,CATS,{includeEmpty:true,emptyLabel:"\u672a\u8a2d\u5b9a"});fill(el.edgeRelationType,REL);fillArrows(el.edgeArrowStart);fillArrows(el.edgeArrowEnd);txt();bind();loadGraph(sample());render();})();
